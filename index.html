<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>StatsBet ⚽</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0a0a0f;--bg2:#13131a;--bg3:#1c1c26;--bg4:#242432;--acc:#4f8ef7;--acc2:#7c6cf7;--grn:#22c55e;--red:#ef4444;--amb:#f59e0b;--blu:#3b82f6;--t1:#fff;--t2:#a0a0b8;--t3:#606078;--bdr:rgba(255,255,255,0.07);--r:14px;}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;}
.app{max-width:430px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;}
.header{background:var(--bg);padding:14px 16px 10px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--bdr);}
.hrow1{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#4f8ef7,#a78bf7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.live{font-size:10px;font-weight:700;color:var(--grn);display:flex;align-items:center;gap:4px;}
.live::before{content:'';width:5px;height:5px;background:var(--grn);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.lscroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.lscroll::-webkit-scrollbar{display:none;}
.lpill{padding:6px 13px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg2);cursor:pointer;font-size:12px;font-weight:600;color:var(--t2);white-space:nowrap;flex-shrink:0;transition:all .15s;}
.lpill.on{background:var(--acc);border-color:var(--acc);color:#fff;}
.content{flex:1;overflow-y:auto;padding:10px 14px 80px;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(19,19,26,.95);border-top:1px solid var(--bdr);backdrop-filter:blur(12px);display:flex;padding:8px 0 14px;z-index:100;}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0;}
.bi i{font-size:22px;color:var(--t3);}
.bi span{font-size:10px;font-weight:600;color:var(--t3);}
.bi.on i,.bi.on span{color:var(--acc);}
.slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin:14px 0 8px;}
.mc{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden;cursor:pointer;}
.mc.on{border-color:rgba(79,142,247,.5);}
.mch{padding:12px 14px;}
.mmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.rtag{font-size:10px;font-weight:700;color:var(--t3);background:var(--bg3);padding:3px 8px;border-radius:20px;}
.mdate{font-size:10px;color:var(--t3);}
.trow{display:grid;grid-template-columns:1fr 52px 1fr;align-items:center;gap:6px;}
.tside{display:flex;flex-direction:column;align-items:center;gap:4px;}
.tlogo{width:34px;height:34px;object-fit:contain;}
.tph{width:34px;height:34px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;}
.tname{font-size:12px;font-weight:700;text-align:center;}
.tform{display:flex;gap:2px;}
.fd{width:6px;height:6px;border-radius:50%;}
.fdW{background:var(--grn);}.fdD{background:var(--amb);}.fdL{background:var(--red);}
.sctr{text-align:center;}
.scr{font-size:22px;font-weight:800;}
.scrL{font-size:22px;font-weight:800;color:var(--grn);}
.vs{font-size:11px;font-weight:700;color:var(--t3);}
.prow{padding:0 14px 12px;}
.pbar{display:flex;border-radius:6px;overflow:hidden;height:22px;}
.ph2{background:var(--acc);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.pd2{background:var(--bg4);color:var(--t2);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.pa2{background:var(--red);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.plbls{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:3px;padding:0 2px;}
.dw{border-top:1px solid var(--bdr);}
.dtabs{display:flex;gap:5px;padding:10px 14px 0;}
.dtab{padding:5px 11px;border-radius:20px;border:1px solid var(--bdr);background:transparent;cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);}
.dtab.on{background:var(--acc);border-color:var(--acc);color:#fff;}
.dc{padding:12px 14px 14px;}
.ins{display:flex;gap:7px;padding:8px 10px;border-radius:10px;margin-bottom:6px;font-size:12px;line-height:1.4;font-weight:500;align-items:flex-start;}
.ins i{flex-shrink:0;font-size:14px;margin-top:1px;}
.ing{background:rgba(34,197,94,.12);color:#4ade80;}
.ina{background:rgba(245,158,11,.13);color:#fbbf24;}
.inr{background:rgba(239,68,68,.12);color:#f87171;}
.inb{background:rgba(79,142,247,.12);color:#93c5fd;}
.srow{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.sv{font-size:12px;font-weight:800;width:28px;text-align:right;color:var(--acc);}
.svr{font-size:12px;font-weight:800;width:28px;color:var(--red);}
.sb{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.sbh{height:100%;background:var(--acc);border-radius:2px;}
.sba{height:100%;background:var(--red);border-radius:2px;float:right;}
.sl{font-size:9px;color:var(--t3);width:68px;text-align:center;flex-shrink:0;}
.erow{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:10px;padding:9px 11px;margin-bottom:6px;border:1px solid var(--bdr);}
.erk{font-size:12px;font-weight:700;color:var(--t3);width:14px;}
.elg{width:22px;height:22px;object-fit:contain;}
.en{font-size:13px;font-weight:700;flex:1;}
.ebdg{font-size:10px;font-weight:700;padding:3px 7px;border-radius:20px;}
.ebg{background:rgba(34,197,94,.15);color:var(--grn);}
.eba{background:rgba(245,158,11,.15);color:var(--amb);}
.ebr{background:rgba(239,68,68,.15);color:var(--red);}
.ebb{background:rgba(79,142,247,.15);color:var(--blu);}
.estats{display:flex;gap:10px;}
.estv{font-size:13px;font-weight:800;}
.estl{font-size:9px;color:var(--t3);}
.kpills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.kp{padding:5px 10px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg2);cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);}
.kp.on{background:var(--acc2);border-color:var(--acc2);color:#fff;}
.at{width:100%;border-collapse:collapse;font-size:11px;}
.at th{padding:5px 7px;color:var(--t3);font-weight:700;border-bottom:1px solid var(--bdr);text-align:right;white-space:nowrap;}
.at th:first-child{text-align:left;}
.at td{padding:7px 7px;border-bottom:1px solid var(--bdr);color:var(--t1);font-weight:600;text-align:right;}
.at td:first-child{text-align:left;font-weight:800;}
.loader{text-align:center;padding:40px 0;color:var(--t2);}
.loader i{font-size:28px;display:block;margin-bottom:8px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.errbx{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:14px;font-size:13px;color:#f87171;line-height:1.6;}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="hrow1">
    <span class="logo">StatsBet ⚽</span>
    <span class="live" id="apiStatus">Connexion...</span>
  </div>
  <div class="lscroll">
    <button class="lpill on" onclick="setL(1,'CdM 2026',this)">🏆 CdM 2026</button>
    <button class="lpill" onclick="setL(2,'UCL',this)">⭐ UCL</button>
    <button class="lpill" onclick="setL(39,'Premier League',this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 PL</button>
    <button class="lpill" onclick="setL(61,'Ligue 1',this)">🇫🇷 L1</button>
    <button class="lpill" onclick="setL(140,'La Liga',this)">🇪🇸 La Liga</button>
  </div>
</div>
<div class="content" id="ct">
  <div class="loader"><i class="ti ti-loader"></i>Chargement...</div>
</div>
<nav class="bnav">
  <div class="bi on" onclick="showT('m',this)"><i class="ti ti-calendar-event"></i><span>Matchs</span></div>
  <div class="bi" onclick="showT('e',this)"><i class="ti ti-shield-half"></i><span>Equipes</span></div>
  <div class="bi" onclick="showT('a',this)"><i class="ti ti-chart-dots"></i><span>Analyse</span></div>
</nav>
</div>
<script>
const SEASON = 2026;
const CACHE = {};

async function api(endpoint) {
  if (CACHE[endpoint]) return CACHE[endpoint];
  const url = '/api/football?endpoint=' + encodeURIComponent(endpoint);
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  if (d.errors && Object.keys(d.errors).length) throw new Error(JSON.stringify(d.errors));
  CACHE[endpoint] = d;
  return d;
}

let lg = 1, tab = 'm', om = null, mt = {};
let TEAMS = [], MATCHES = [];
let ak = ['gf','ga','cs','g2','ca','po'];

const gfA = t => t.gf / Math.max(t.j, 1);
const gaA = t => t.ga / Math.max(t.j, 1);
const g2p = t => { var x = t.g1 + t.g2; return x > 0 ? Math.round(t.g2 / x * 100) : 0; };
const fp  = f => f.reduce((s,r) => s + (r==='W'?3:r==='D'?1:0), 0);
const fmtD = d => new Date(d).toLocaleDateString('fr-FR', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
const GT = id => TEAMS.find(t => t.id === id);

function setStatus(msg, color) {
  var el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.style.color = color || 'var(--grn)';
}

function prob(h, a) {
  var fS = function(t) { return fp(t.f) / Math.max(t.f.length * 3, 1); };
  var hs = fS(h)*.28 + (gfA(h)/4)*.20 + ((1/Math.max(gaA(h),.1))/4)*.15 + (h.po/100)*.07 + (h.cs/Math.max(h.j,1))*.12 + .08;
  var as = fS(a)*.28 + (gfA(a)/4)*.20 + ((1/Math.max(gaA(a),.1))/4)*.15 + (a.po/100)*.07 + (a.cs/Math.max(a.j,1))*.12;
  var tot = hs + as;
  var hp = Math.max(Math.round(hs/tot*76), 8);
  var ap = Math.max(Math.round(as/tot*76), 8);
  return {h: hp, d: Math.max(100-hp-ap, 6), a: ap};
}

function getInsights(h, a) {
  var r = [];
  var hgf=gfA(h), agf=gfA(a), hga=gaA(h), aga=gaA(a), avg=(hgf+agf)/2;
  if (avg >= 2.8) r.push({c:'ing',i:'ti-plus',t:'Attaques prolifiques ('+avg.toFixed(1)+' buts/m) - "Plus de 2.5" a de la valeur'});
  else if (avg <= 1.4) r.push({c:'inb',i:'ti-minus',t:'Matchs fermes ('+avg.toFixed(1)+' buts/m) - "Moins de 2.5" solide'});
  if (hgf>=1.5 && aga>=1.0 && agf>=1.5 && hga>=1.0) r.push({c:'ina',i:'ti-target',t:'BTTS OUI probable - les deux equipes marquent et encaissent regulierement'});
  else {
    var csH = h.cs/Math.max(h.j,1), csA = a.cs/Math.max(a.j,1);
    if (csH >= .5 || csA >= .5) {
      var w = csH >= csA ? h : a;
      r.push({c:'ing',i:'ti-lock',t:'BTTS NON interessant - '+w.name+' cage propre dans '+Math.round(Math.max(csH,csA)*100)+'% des matchs'});
    }
  }
  var hg = g2p(h), ag = g2p(a);
  if (hg >= 62) r.push({c:'ina',i:'ti-clock',t:h.name+' marque '+hg+'% de ses buts en 2e MT - parier "2e MT +"'});
  if (ag >= 62) r.push({c:'ina',i:'ti-clock',t:a.name+' marque '+ag+'% de ses buts en 2e MT - parier "2e MT +"'});
  if (h.ca >= 2.5 && a.ca >= 2.5) r.push({c:'ina',i:'ti-square',t:'Deux equipes indisciplinees - "Plus de 4.5 cartons" rentable'});
  else if (h.ca >= 2.5 || a.ca >= 2.5) {
    var w2 = h.ca >= a.ca ? h : a;
    r.push({c:'ina',i:'ti-square',t:w2.name+' '+w2.ca+' cartons/match - marche cartons interessant'});
  }
  if (h.cb >= 2) r.push({c:'inb',i:'ti-arrow-up',t:h.name+' : '+h.cb+' remontadas - valeur live si mene'});
  if (a.cb >= 2) r.push({c:'inb',i:'ti-arrow-up',t:a.name+' : '+a.cb+' remontadas - valeur live si mene'});
  if (hga <= .5) r.push({c:'ing',i:'ti-shield',t:h.name+' defense beton ('+hga.toFixed(1)+' bg/m) - "0-0 a la MT" a explorer'});
  if (aga <= .5) r.push({c:'ing',i:'ti-shield',t:a.name+' defense beton ('+aga.toFixed(1)+' bg/m)'});
  if (hgf >= 2.5) r.push({c:'ing',i:'ti-plus',t:h.name+' : '+hgf.toFixed(1)+' buts/m - "1.5+ buts" pour eux solide'});
  if (agf >= 2.5) r.push({c:'ing',i:'ti-plus',t:a.name+' : '+agf.toFixed(1)+' buts/m - force offensive a surveiller'});
  return r;
}

function getBadge(t) {
  if (gaA(t) <= .4) return {c:'ebg', l:'Def solide'};
  if (gfA(t) >= 2.8) return {c:'ebg', l:'Attaque'};
  if (t.ca >= 2.8)   return {c:'ebr', l:'Cartons'};
  if (g2p(t) >= 65)  return {c:'eba', l:'2e MT'};
  if (t.cb >= 2)     return {c:'ebb', l:'Remontada'};
  if (gaA(t) >= 1.2 && gfA(t) >= 1.2) return {c:'eba', l:'BTTS'};
  return null;
}

function logoEl(url, fallback, cls) {
  if (url) return '<img class="'+cls+'" src="'+url+'" alt="">';
  return '<div class="tph">'+fallback+'</div>';
}

function renderMatchs() {
  if (!MATCHES.length) return '<p style="color:var(--t2);padding:20px 0;text-align:center;">Aucun match trouve.</p>';
  var rounds = [...new Set(MATCHES.map(function(m){return m.round;}))];
  var h = '';
  for (var ri = 0; ri < rounds.length; ri++) {
    var rnd = rounds[ri];
    var ms = MATCHES.filter(function(m){return m.round===rnd;});
    h += '<p class="slbl">'+rnd+'</p>';
    for (var mi = 0; mi < ms.length; mi++) {
      var m = ms[mi];
      var hT = GT(m.hid), aT = GT(m.aid);
      var hn = hT ? hT.name : m.hname, an = aT ? aT.name : m.aname;
      var hl = hT ? hT.logo : '', al = aT ? aT.logo : '';
      var hf = hT ? hT.f : [], af = aT ? aT.f : [];
      var played = m.sc !== null && !m.live;
      var isO = om === m.id;
      var p = (hT && aT) ? prob(hT, aT) : {h:33,d:34,a:33};
      var verd = p.h>p.a && p.h>p.d ? hn : p.a>p.h && p.a>p.d ? an : 'Nul';
      var logoH = logoEl(hl, '⚽', 'tlogo');
      var logoA = logoEl(al, '⚽', 'tlogo');
      var formH = hf.slice(0,4).map(function(r){return '<span class="fd fd'+r+'"></span>';}).join('');
      var formA = af.slice(0,4).map(function(r){return '<span class="fd fd'+r+'"></span>';}).join('');
      var scoreHtml = played ? '<div class="scr">'+m.sc.h+'<span style="color:var(--t3);margin:0 1px">-</span>'+m.sc.a+'</div>'
                    : m.live ? '<div class="scrL">'+m.sc.h+'-'+m.sc.a+'</div>'
                    : '<div class="vs">VS</div>';
      var probaHtml = (!played && !m.live && hT && aT)
        ? '<div class="prow"><div class="pbar"><div class="ph2" style="flex:'+p.h+'">'+p.h+'%</div><div class="pd2" style="flex:'+p.d+'">'+p.d+'%</div><div class="pa2" style="flex:'+p.a+'">'+p.a+'%</div></div><div class="plbls"><span>'+hn+'</span><span>Nul</span><span>'+an+'</span></div></div>'
        : '';
      var detailHtml = (isO && hT && aT) ? buildDetail(m, hT, aT, p, verd) : '';
      h += '<div class="mc'+(isO?' on':'')+'" onclick="tM('+m.id+')">'
         + '<div class="mch">'
         + '<div class="mmeta"><span class="rtag">'+rnd+'</span><span class="mdate">'+fmtD(m.date)+'</span></div>'
         + '<div class="trow">'
         + '<div class="tside">'+logoH+'<div class="tname">'+hn+'</div><div class="tform">'+formH+'</div></div>'
         + '<div class="sctr">'+scoreHtml+'</div>'
         + '<div class="tside">'+logoA+'<div class="tname">'+an+'</div><div class="tform">'+formA+'</div></div>'
         + '</div></div>'
         + probaHtml + detailHtml + '</div>';
    }
  }
  return h;
}

function buildDetail(m, h, a, p, verd) {
  var t = mt[m.id] || 'ins';
  var c = '';
  if (t === 'ins') {
    var ii = getInsights(h, a);
    c = '<div class="ins inb"><i class="ti ti-trending-up"></i><span>Favori stat : <strong>'+verd+'</strong></span></div>';
    c += ii.map(function(i){return '<div class="ins '+i.c+'"><i class="ti '+i.i+'"></i><span>'+i.t+'</span></div>';}).join('');
  } else if (t === 'st') {
    var rows = [
      ['Buts/m', gfA(h), gfA(a), 3],
      ['Encaisses/m', gaA(h), gaA(a), 2.5],
      ['Possession', h.po, a.po, 100],
      ['Tirs/m', h.sh, a.sh, 20],
      ['Clean sheets', h.cs, a.cs, Math.max(h.j,1)],
      ['Cartons/m', h.ca, a.ca, 4]
    ];
    c = '<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:8px;">'
      + '<span style="color:var(--acc);font-weight:800;">'+h.name+'</span>'
      + '<span style="color:var(--red);font-weight:800;">'+a.name+'</span></div>';
    c += rows.map(function(row){
      var l=row[0],hv=row[1],av=row[2],mx=row[3];
      return '<div class="srow"><span class="sv">'+hv.toFixed(1)+'</span>'
        +'<div class="sb"><div class="sbh" style="width:'+Math.min(Math.round(hv/mx*100),100)+'%"></div></div>'
        +'<span class="sl">'+l+'</span>'
        +'<div class="sb"><div class="sba" style="width:'+Math.min(Math.round(av/mx*100),100)+'%"></div></div>'
        +'<span class="svr">'+av.toFixed(1)+'</span></div>';
    }).join('');
  } else {
    c = '<p style="color:var(--t2);font-size:12px;">Donnees buteurs non disponibles sur plan gratuit.</p>';
  }
  return '<div class="dw"><div class="dtabs">'
    + '<button class="dtab'+(t==='ins'?' on':'')+'" onclick="smt('+m.id+',\'ins\');event.stopPropagation()">Insights</button>'
    + '<button class="dtab'+(t==='st'?' on':'')+'" onclick="smt('+m.id+',\'st\');event.stopPropagation()">Stats</button>'
    + '<button class="dtab'+(t==='sc'?' on':'')+'" onclick="smt('+m.id+',\'sc\');event.stopPropagation()">Buteurs</button>'
    + '</div><div class="dc">'+c+'</div></div>';
}

function renderEquipes() {
  if (!TEAMS.length) return '<p style="color:var(--t2);padding:20px 0;text-align:center;">Aucune equipe.</p>';
  function teamRow(t, i) {
    var b = getBadge(t);
    var logoHtml = t.logo ? '<img class="elg" src="'+t.logo+'" alt="">' : '<span style="font-size:16px">⚽</span>';
    var badgeHtml = b ? '<span class="ebdg '+b.c+'">'+b.l+'</span>' : '';
    return '<div class="erow">'
      + '<span class="erk">'+(i+1)+'</span>'
      + logoHtml
      + '<span class="en">'+t.name+'</span>'
      + badgeHtml
      + '<div class="estats">'
      + '<div style="text-align:center"><div class="estv">'+t.pts+'</div><div class="estl">pts</div></div>'
      + '<div style="text-align:center"><div class="estv">'+gfA(t).toFixed(1)+'</div><div class="estl">buts/m</div></div>'
      + '<div style="text-align:center"><div class="estv">'+t.cs+'</div><div class="estl">CS</div></div>'
      + '</div></div>';
  }
  var grps = [...new Set(TEAMS.map(function(t){return t.gr;}))].filter(Boolean).sort();
  if (!grps.length) {
    return TEAMS.sort(function(a,b){return b.pts-a.pts;}).map(teamRow).join('');
  }
  var h = '';
  for (var i = 0; i < grps.length; i++) {
    var g = grps[i];
    var ts = TEAMS.filter(function(t){return t.gr===g;}).sort(function(a,b){return b.pts-a.pts;});
    h += '<p class="slbl">Groupe '+g+'</p>';
    ts.forEach(teamRow.bind(null));
    h += ts.map(teamRow).join('');
  }
  return h;
}

var AK = [
  {k:'gf', l:'Buts/m',   fn:function(t){return gfA(t).toFixed(1);}},
  {k:'ga', l:'Enc/m',    fn:function(t){return gaA(t).toFixed(1);}},
  {k:'cs', l:'CS',       fn:function(t){return t.cs;}},
  {k:'g2', l:'2eMT%',    fn:function(t){return g2p(t)+'%';}},
  {k:'ca', l:'Cartons',  fn:function(t){return t.ca;}},
  {k:'po', l:'Poss%',    fn:function(t){return t.po+'%';}},
  {k:'cb', l:'Remontada',fn:function(t){return t.cb;}},
  {k:'sh', l:'Tirs/m',   fn:function(t){return t.sh;}},
  {k:'fp', l:'Forme pts', fn:function(t){return fp(t.f);}},
  {k:'pts',l:'Points',   fn:function(t){return t.pts;}},
  {k:'df', l:'Diff',     fn:function(t){return (t.gf-t.ga>=0?'+':'')+(t.gf-t.ga);}}
];

function renderAnalyse() {
  var pills = AK.map(function(k){
    return '<button class="kp'+(ak.includes(k.k)?' on':'')+'" onclick="tK(\''+k.k+'\')">'+k.l+'</button>';
  }).join('');
  if (!TEAMS.length) return '<div class="kpills">'+pills+'</div><p style="color:var(--t2);padding:20px 0;text-align:center;">Aucune equipe.</p>';
  var teams = [...TEAMS].sort(function(a,b){return b.pts-a.pts;});
  var hdrs = ak.map(function(k){ var kk=AK.find(function(x){return x.k===k;}); return '<th>'+(kk?kk.l:k)+'</th>'; }).join('');
  var rows = teams.map(function(t){
    var cells = ak.map(function(k){ var kk=AK.find(function(x){return x.k===k;}); return '<td>'+(kk?kk.fn(t):'')+'</td>'; }).join('');
    return '<tr><td>'+t.name+'</td>'+cells+'</tr>';
  }).join('');
  return '<div class="kpills">'+pills+'</div><div style="overflow-x:auto"><table class="at"><thead><tr><th>Equipe</th>'+hdrs+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function render() {
  document.getElementById('ct').innerHTML = tab==='m' ? renderMatchs() : tab==='e' ? renderEquipes() : renderAnalyse();
}

function tM(id) { om = om===id ? null : id; render(); }
function smt(id, t) { mt[id] = t; render(); }
function tK(k) { ak = ak.includes(k) ? ak.filter(function(x){return x!==k;}) : [...ak,k]; render(); }

async function loadLeague() {
  TEAMS = []; MATCHES = []; om = null; mt = {};
  document.getElementById('ct').innerHTML = '<div class="loader"><i class="ti ti-loader"></i>Chargement API...</div>';
  setStatus('Chargement...', 'var(--amb)');
  try {
    var fixRes = await api('/fixtures?league='+lg+'&season='+SEASON);
    if (!fixRes.response || !fixRes.response.length) throw new Error('Aucun match trouve pour league='+lg+' saison='+SEASON);

    var teamMap = {};
    MATCHES = [];

    fixRes.response.forEach(function(f) {
      var h = f.teams.home, a = f.teams.away;
      var st = f.fixture.status.short;
      var played = ['FT','AET','PEN'].includes(st);
      var live = ['1H','HT','2H','ET','BT','P'].includes(st);
      var hg = f.goals.home, ag = f.goals.away;

      [h, a].forEach(function(team) {
        if (!teamMap[team.id]) teamMap[team.id] = {id:team.id,name:team.name,logo:team.logo,gr:'',pts:0,j:0,gf:0,ga:0,f:[],g1:0,g2:0,cs:0,ca:0,po:50,sh:0,cb:0};
      });

      if (played && hg !== null && ag !== null) {
        var ht = teamMap[h.id], at = teamMap[a.id];
        ht.j++; at.j++; ht.gf += hg; ht.ga += ag; at.gf += ag; at.ga += hg;
        if (hg > ag) { ht.pts+=3; ht.f.unshift('W'); at.f.unshift('L'); }
        else if (hg === ag) { ht.pts++; at.pts++; ht.f.unshift('D'); at.f.unshift('D'); }
        else { at.pts+=3; at.f.unshift('W'); ht.f.unshift('L'); }
        if (ag === 0) ht.cs++;
        if (hg === 0) at.cs++;
      }

      MATCHES.push({
        id: f.fixture.id,
        hid: h.id, aid: a.id,
        hname: h.name, aname: a.name,
        round: f.league.round,
        date: f.fixture.date,
        sc: (played || live) && hg !== null ? {h:hg, a:ag} : null,
        live: live
      });
    });

    // Try standings for group info
    try {
      var stRes = await api('/standings?league='+lg+'&season='+SEASON);
      if (stRes.response && stRes.response.length) {
        stRes.response[0].league.standings.forEach(function(group) {
          group.forEach(function(entry) {
            var t = teamMap[entry.team.id];
            if (t) {
              t.gr = entry.group || '';
              t.pts = entry.points;
              t.j = entry.all.played;
              t.gf = entry.all.goals.for;
              t.ga = entry.all.goals.against;
            }
          });
        });
      }
    } catch(e) {}

    // Stats for top 6 teams (quota)
    var ids = Object.keys(teamMap).slice(0, 6);
    for (var i = 0; i < ids.length; i++) {
      try {
        var sRes = await api('/teams/statistics?league='+lg+'&season='+SEASON+'&team='+ids[i]);
        var s = sRes.response;
        if (!s) continue;
        var t = teamMap[ids[i]];
        var played2 = s.fixtures && s.fixtures.played ? s.fixtures.played.total : 0;
        if (played2 > 0) {
          t.po = parseInt(s.possession && s.possession.average ? s.possession.average.total : 50) || 50;
          t.sh = Math.round((s.shots && s.shots.on ? s.shots.on.total || 0 : 0) / played2);
          var yel = s.cards && s.cards.yellow ? Object.values(s.cards.yellow).reduce(function(a,v){return a+(v&&v.total?v.total:0);},0) : 0;
          var red = s.cards && s.cards.red ? Object.values(s.cards.red).reduce(function(a,v){return a+(v&&v.total?v.total:0);},0) : 0;
          t.ca = Math.round((yel+red)/played2*10)/10;
          t.cs = s.clean_sheet ? s.clean_sheet.total || t.cs : t.cs;
          var mins = s.goals && s.goals.for ? s.goals.for.minute || {} : {};
          t.g1 = mins['0-45'] ? mins['0-45'].total || 0 : 0;
          t.g2 = (mins['46-60']?mins['46-60'].total||0:0)+(mins['61-75']?mins['61-75'].total||0:0)+(mins['76-90']?mins['76-90'].total||0:0)+(mins['91-105']?mins['91-105'].total||0:0);
        }
      } catch(e) {}
    }

    TEAMS = Object.values(teamMap).filter(function(t){return t.j>0;});
    TEAMS.forEach(function(t){ t.f = t.f.slice(0,5); });

    var reqInfo = fixRes.requests;
    setStatus('API ok - '+MATCHES.length+' matchs', 'var(--grn)');
    render();
  } catch(err) {
    setStatus('Erreur', 'var(--red)');
    document.getElementById('ct').innerHTML = '<div class="errbx"><strong>Erreur : </strong>'+err.message+'<br><br>Si la CdM 2026 ne charge pas encore, essaie Premier League ou Ligue 1 - elles fonctionnent sur le plan gratuit.</div>';
  }
}

function setL(id, name, el) {
  lg = id; om = null; mt = {};
  document.querySelectorAll('.lpill').forEach(function(p){p.classList.remove('on');});
  el.classList.add('on');
  loadLeague();
}

function showT(name, el) {
  tab = name; om = null;
  document.querySelectorAll('.bi').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  render();
}

loadLeague();
</script>
