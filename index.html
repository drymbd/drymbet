const G=id=>DB[lg].teams.find(t=>t.id===id);
const gfA=t=>t.gf/Math.max(t.j,1);
const gaA=t=>t.ga/Math.max(t.j,1);
const g2p=t=>{const x=t.g1+t.g2;return x>0?Math.round(t.g2/x*100):0;};
const fp=f=>f.reduce((s,r)=>s+(r==='W'?3:r==='D'?1:0),0);
const fd=d=>new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});

function prob(h,a){
  const fS=t=>fp(t.f)/Math.max(t.f.length*3,1);
  let hs=fS(h)*.28+(gfA(h)/4)*.20+((1/Math.max(gaA(h),.1))/4)*.15+(h.po/100)*.07+(h.cs/Math.max(h.j,1))*.12+.08;

  const tot=hs+as,hp=Math.max(Math.round(hs/tot*76),8),ap=Math.max(Math.round(as/tot*76),8);
  return{h:hp,d:Math.max(100-hp-ap,6),a:ap};
}

  const r=[],hgf=gfA(h),agf=gfA(a),hga=gaA(h),aga=gaA(a),avg=(hgf+agf)/2;

  const hg=g2p(h),ag=g2p(a);
  if(hg>=62) r.push({c:'ina',i:'ti-clock',t:`${h.n} marque ${hg}% de ses buts en 2e MT → parier "2e MT +"`});
  if(ag>=62) r.push({c:'ina',i:'ti-clock',t:`${a.n} marque ${ag}% de ses buts en 2e MT → parier "2e MT +"`});
  if(h.ca>=2.5&&a.ca>=2.5) r.push({c:'ina',i:'ti-square',t:`Deux équipes indisciplinées → "Plus de 4.5 cartons" rentable`});
  else if(h.ca>=2.5||a.ca>=2.5){const w=h.ca>=a.ca?h:a;r.push({c:'ina',i:'ti-square',t:`${w.n} ${w.ca} cartons/match → marché cartons intéressant`});}
  const hot=[...h.sc,...a.sc].find(s=>s.l.reduce((x,g)=>x+g,0)>=4);
  if(hot) r.push({c:'ing',i:'ti-flame',t:`${hot.n} en feu : ${hot.l.reduce((x,g)=>x+g,0)} buts sur 3 matchs → cote buteur sous-évaluée`});
  const dry=[...h.sc,...a.sc].find(s=>s.g>=2&&s.l.every(g=>g===0));
  if(dry) r.push({c:'inr',i:'ti-trending-down',t:`${dry.n} à sec depuis 3 matchs — cote gonflée, valeur sur "ne marque pas"`});
  if(h.cb>=2) r.push({c:'inb',i:'ti-arrow-up',t:`${h.n} : ${h.cb} remontadas → valeur live si mené`});
  if(a.cb>=2) r.push({c:'inb',i:'ti-arrow-up',t:`${a.n} : ${a.cb} remontadas → valeur live si mené`});
  if(hga<=.5) r.push({c:'ing',i:'ti-shield',t:`${h.n} défense béton (${hga.toFixed(1)} bg/m) → "0-0 à la MT" à explorer`});
  if(aga<=.5) r.push({c:'ing',i:'ti-shield',t:`${a.n} défense béton (${aga.toFixed(1)} bg/m)`});
  if(hgf>=2.5) r.push({c:'ing',i:'ti-plus',t:`${h.n} : ${hgf.toFixed(1)} buts/match → "1.5+ buts" pour eux solide`});
  if(agf>=2.5) r.push({c:'ing',i:'ti-plus',t:`${a.n} : ${agf.toFixed(1)} buts/match → force offensive à surveiller`});
  return r;
}

function badge(t){
  if(gaA(t)<=.4) return{c:'ebg',l:'🔒 Défense'};
  if(gfA(t)>=2.8) return{c:'ebg',l:'🔥 Attaque'};
  if(t.ca>=2.8) return{c:'ebr',l:'⚠️ Cartons'};
  if(g2p(t)>=65) return{c:'eba',l:'⏱ 2e MT'};
  if(t.cb>=2) return{c:'ebb',l:'↑ Remontada'};
  if(gaA(t)>=1.4&&gfA(t)>=1.4) return{c:'eba',l:'⚽ BTTS'};
  return null;
}

function rM(){
  const L=DB[lg];
  if(!L.matches.length) return '<p class="empty">Aucun match disponible.</p>';
  const rounds=[...new Set(L.matches.map(m=>m.r))];
  let h='';
  for(const rnd of rounds){
    h+=`<p class="slbl">${rnd}</p>`;
    for(const m of L.matches.filter(x=>x.r===rnd)){
      const hT=G(m.h),aT=G(m.a);
      if(!hT||!aT) continue;
      const played=m.sc!==null,isO=om===m.id,p=prob(hT,aT);
      const verd=p.h>p.a&&p.h>p.d?hT.n:p.a>p.h&&p.a>p.d?aT.n:'Nul';
      const logoH=hT.logo?`<img class="tlogo" src="${hT.logo}" alt="" onerror="this.outerHTML='<div class=tph>${hT.fl}</div>'">`:`<div class="tph">${hT.fl}</div>`;
      const logoA=aT.logo?`<img class="tlogo" src="${aT.logo}" alt="" onerror="this.outerHTML='<div class=tph>${aT.fl}</div>'">`:`<div class="tph">${aT.fl}</div>`;
      h+=`<div class="mc ${isO?'on':''}" onclick="tM(${m.id})">
        <div class="mch">
          <div class="mmeta"><span class="rtag">${rnd.includes('groupes')?'Groupes':rnd}</span><span class="mdate">${fd(m.dt)}</span></div>
          <div class="trow">
            <div class="tside">${logoH}<div class="tname">${hT.n}</div><div class="tform">${hT.f.slice(0,4).map(r=>`<span class="fd fd${r}"></span>`).join('')}</div></div>
            <div class="sctr">${played?`<div class="scr">${m.sc.h}<span style="color:var(--t3);margin:0 1px">-</span>${m.sc.a}</div>`:`<div class="vs">VS</div>`}</div>
            <div class="tside">${logoA}<div class="tname">${aT.n}</div><div class="tform">${aT.f.slice(0,4).map(r=>`<span class="fd fd${r}"></span>`).join('')}</div></div>
          </div>
        </div>
        ${!played?`<div class="prow"><div class="pbar"><div class="ph2" style="flex:${p.h}">${p.h}%</div><div class="pd2" style="flex:${p.d}">${p.d}%</div><div class="pa2" style="flex:${p.a}">${p.a}%</div></div><div class="plbls"><span>${hT.n}</span><span>Nul</span><span>${aT.n}</span></div></div>`:''}
        ${isO?bD(m,hT,aT,p,verd):''}
      </div>`;
    }
  }
  return h;
}

function bD(m,h,a,p,verd){
  const t=mt[m.id]||'ins';
  let c='';
  if(t==='ins'){
    const ii=ins(h,a);
    c=`${!m.sc?`<div class="ins inb"><i class="ti ti-trending-up"></i><span>Favori stat : <strong>${verd}</strong></span></div>`:''}${ii.map(i=>`<div class="ins ${i.c}"><i class="ti ${i.i}"></i><span>${i.t}</span></div>`).join('')}`;
  } else if(t==='st'){
    const rows=[['Buts/m',gfA(h),gfA(a),3],['Encaissés/m',gaA(h),gaA(a),2.5],['Possession',h.po,a.po,100],['Tirs/m',h.sh,a.sh,20],['Clean sheets',h.cs,a.cs,h.j],['Cartons/m',h.ca,a.ca,4]];
    c=`<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:8px;"><span style="color:var(--acc);font-weight:800;">${h.n}</span><span style="color:var(--red);font-weight:800;">${a.n}</span></div>`+rows.map(([l,hv,av,mx])=>`<div class="srow"><span class="sv">${hv.toFixed(1)}</span><div class="sb"><div class="sbh" style="width:${Math.round(hv/mx*100)}%"></div></div><span class="sl">${l}</span><div class="sb"><div class="sba" style="width:${Math.round(av/mx*100)}%"></div></div><span class="svr">${av.toFixed(1)}</span></div>`).join('');
  } else {
    c=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div><p style="font-size:10px;font-weight:800;color:var(--acc);margin-bottom:7px;">${h.n}</p>${h.sc.map(s=>`<div class="scrow"><span class="scn">${s.n}</span><div class="g3">${s.l.map(g=>`<span class="gb ${g>0?'gby':'gbn'}">${g}</span>`).join('')}</div><span class="scg">${s.g}⚽</span></div>`).join('')}</div><div><p style="font-size:10px;font-weight:800;color:var(--red);margin-bottom:7px;">${a.n}</p>${a.sc.map(s=>`<div class="scrow"><span class="scn">${s.n}</span><div class="g3">${s.l.map(g=>`<span class="gb ${g>0?'gby':'gbn'}">${g}</span>`).join('')}</div><span class="scg">${s.g}⚽</span></div>`).join('')}</div></div>`;
  }
  return `<div class="dw"><div class="dtabs"><button class="dtab ${t==='ins'?'on':''}" onclick="smt(${m.id},'ins');event.stopPropagation()">💡 Insights</button><button class="dtab ${t==='st'?'on':''}" onclick="smt(${m.id},'st');event.stopPropagation()">📊 Stats</button><button class="dtab ${t==='sc'?'on':''}" onclick="smt(${m.id},'sc');event.stopPropagation()">⚽ Buteurs</button></div><div class="dc">${c}</div></div>`;
}

function rE(){
  const L=DB[lg];
  if(!L.teams.length) return '<p class="empty">Aucune équipe.</p>';
  const grps=[...new Set(L.teams.map(t=>t.gr))].sort();
  let h='';
  for(const g of grps){
    const ts=L.teams.filter(t=>t.gr===g).sort((a,b)=>b.pts-a.pts);
    h+=`<p class="slbl">Groupe ${g}</p>`;
    ts.forEach((t,i)=>{
      const b=badge(t);
      const lg2=t.logo?`<img class="elg" src="${t.logo}" alt="" onerror="this.outerHTML='<span style=font-size:18px>${t.fl}</span>'">`:`<span style="font-size:18px">${t.fl}</span>`;
      h+=`<div class="erow"><span class="erk">${i+1}</span>${lg2}<span class="en">${t.n}</span>${b?`<span class="ebdg ${b.c}">${b.l}</span>`:''}<div class="estats"><div style="text-align:center"><div class="estv">${t.pts}</div><div class="estl">pts</div></div><div style="text-align:center"><div class="estv">${gfA(t).toFixed(1)}</div><div class="estl">buts/m</div></div><div style="text-align:center"><div class="estv">${t.cs}</div><div class="estl">CS</div></div></div></div>`;
    });
  }
  return h;
}

const AK=[
  {k:'gf',l:'Buts/m',fn:t=>gfA(t).toFixed(1)},{k:'ga',l:'Enc/m',fn:t=>gaA(t).toFixed(1)},
  {k:'cs',l:'CS',fn:t=>t.cs},{k:'g2',l:'2eMT%',fn:t=>g2p(t)+'%'},
  {k:'ca',l:'Cartons',fn:t=>t.ca},{k:'po',l:'Poss%',fn:t=>t.po+'%'},
  {k:'cb',l:'Remontada',fn:t=>t.cb},{k:'sh',l:'Tirs/m',fn:t=>t.sh},
  {k:'fp',l:'Pts forme',fn:t=>fp(t.f)},{k:'pts',l:'Points',fn:t=>t.pts},
  {k:'df',l:'Diff',fn:t=>(t.gf-t.ga>0?'+':'')+(t.gf-t.ga)},
];

function rA(){
  const L=DB[lg];
  const pills=AK.map(k=>`<button class="kp ${ak.includes(k.k)?'on':''}" onclick="tK('${k.k}')">${k.l}</button>`).join('');
  if(!L.teams.length) return `<div class="kpills">${pills}</div><p class="empty">Aucune équipe.</p>`;
  const teams=[...L.teams].sort((a,b)=>b.pts-a.pts);
  return `<div class="kpills">${pills}</div><div style="overflow-x:auto"><table class="at"><thead><tr><th>Équipe</th>${ak.map(k=>{const kk=AK.find(x=>x.k===k);return`<th>${kk?.l||k}</th>`;}).join('')}</tr></thead><tbody>${teams.map(t=>`<tr><td><span style="margin-right:4px">${t.fl}</span>${t.n}</td>${ak.map(k=>{const kk=AK.find(x=>x.k===k);return`<td>${kk?kk.fn(t):'—'}</td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;
}

function render(){document.getElementById('ct').innerHTML=tab==='m'?rM():tab==='e'?rE():rA();}
function tM(id){om=om===id?null:id;render();}
function smt(id,t){mt[id]=t;render();}
function tK(k){ak=ak.includes(k)?ak.filter(x=>x!==k):[...ak,k];render();}
function setL(id,el){lg=id;om=null;mt={};document.querySelectorAll('.lpill').forEach(p=>p.classList.remove('on'));el.classList.add('on');render();}
function showT(name,el){tab=name;om=null;document.querySelectorAll('.bi').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();}
render();
</script>
</body>
</html>
